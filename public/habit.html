<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>

<link rel="stylesheet" href="style.css">

<style>
body {
  font-family: Poppins, sans-serif;
  background: #eef2ff;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 { text-align: center; }

.input-box {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #4f46e5;
  color: white;
  cursor: pointer;
}

.habit {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f9fafb;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.habit.done span {
  text-decoration: line-through;
  color: gray;
}

.streak {
  font-size: 12px;
  color: orange;
}

.actions button {
  margin-left: 5px;
}

.done-btn { background: green; }
.delete-btn { background: crimson; }

.progress-box { margin: 15px 0; }

.progress-bar {
  width: 100%;
  height: 10px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: #4f46e5;
}
</style>
</head>

<body>

<div class="container">

<h2>🔥 Habit Tracker</h2>

<div class="input-box">
  <input type="text" id="habitInput" placeholder="New habit...">
  <button onclick="addHabit()">Add</button>
</div>

<div class="progress-box">
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <p id="progressText">0% completed</p>
</div>

<div id="habitList"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>
<script src="utils.js"></script>

<script>

// ==========================
// DATA
// ==========================
let habits = [];

// ==========================
// AUTH CHECK
// ==========================
firebase.auth().onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    loadHabits();
  }
});

// ==========================
// LOAD HABITS (SAFE)
// ==========================
function loadHabits() {

  // 🔹 1. Local fallback
  const local = localStorage.getItem("habits");
  if (local) {
    const parsed = JSON.parse(local);
    habits = parsed.habits || [];
    renderHabits();
  }

  // 🔹 2. Firebase real-time
  listenData("habits", (data) => {
    if (data && data.habits) {
      habits = data.habits;

      resetDailyHabits(); // 🔥 once per sync
      renderHabits();
    }
  });
}

// ==========================
// DAILY RESET
// ==========================
function resetDailyHabits() {
  const today = new Date().toDateString();

  let updated = false;

  habits.forEach(h => {
    if (h.lastDate !== today) {
      h.done = false;
      h.lastDate = today;
      updated = true;
    }
  });

  if (updated) {
    saveData("habits", { habits });
  }
}

// ==========================
// RENDER
// ==========================
function renderHabits() {
  const list = document.getElementById("habitList");
  list.innerHTML = "";

  let doneCount = 0;

  habits.forEach((h, index) => {

    if (h.done) doneCount++;

    const div = document.createElement("div");
    div.className = "habit " + (h.done ? "done" : "");

    div.innerHTML = `
      <div>
        <span>${h.name}</span><br>
        <span class="streak">🔥 Streak: ${h.streak}</span>
      </div>
      <div class="actions">
        <button class="done-btn" onclick="toggleHabit(${index})">✔</button>
        <button class="delete-btn" onclick="deleteHabit(${index})">❌</button>
      </div>
    `;

    list.appendChild(div);
  });

  updateProgress(doneCount);
}

// ==========================
// ADD
// ==========================
function addHabit() {
  const input = document.getElementById("habitInput");
  const name = input.value.trim();

  if (!name) return;

  habits.push({
    name,
    done: false,
    streak: 0,
    lastDate: new Date().toDateString()
  });

  input.value = "";

  saveData("habits", { habits });
}

// ==========================
// TOGGLE
// ==========================
function toggleHabit(index) {
  const habit = habits[index];

  if (!habit.done) {
    habit.done = true;
    habit.streak++;
  } else {
    habit.done = false;
    habit.streak = Math.max(0, habit.streak - 1);
  }

  saveData("habits", { habits });
  updateWeeklyData();
}

// ==========================
// DELETE
// ==========================
function deleteHabit(index) {
  habits.splice(index, 1);
  saveData("habits", { habits });
  updateWeeklyData();
}

// ==========================
// PROGRESS
// ==========================
function updateProgress(done) {
  const total = habits.length;

  let percent = total === 0 ? 0 : Math.round((done / total) * 100);

  document.getElementById("progressFill").style.width = percent + "%";
  document.getElementById("progressText").innerText =
    `${percent}% completed (${done}/${total})`;
}

// ==========================
// AUTO SAVE
// ==========================
enableGlobalAutoSave();

</script>
<footer style="text-align:center; margin-top:40px;">
  <a href="about.html">About</a> |
  <a href="privacy.html">Privacy</a> |
  <a href="terms.html">Terms</a> |
  <a href="contact.html">Contact</a>
</footer>
</body>
</html>
