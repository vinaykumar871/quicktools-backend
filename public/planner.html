<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Planner</title>

<link rel="stylesheet" href="style.css">

<style>
body {
  font-family: Poppins, sans-serif;
  background: #eef2ff;
  padding: 20px;
}

.container {
  max-width: 550px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 { text-align: center; }

.input-box {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

select, input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

input { flex: 1; }

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #4f46e5;
  color: white;
  cursor: pointer;
}

.task {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f9fafb;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.task.done span {
  text-decoration: line-through;
  color: gray;
}

.high { border-left: 5px solid red; }
.medium { border-left: 5px solid orange; }
.low { border-left: 5px solid green; }

.actions button { margin-left: 5px; }

.done-btn { background: green; }
.delete-btn { background: crimson; }

.progress-box { margin: 15px 0; }

.progress-bar {
  width: 100%;
  height: 10px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: #4f46e5;
}

.summary {
  text-align: center;
  margin-top: 10px;
  font-weight: 500;
}
</style>
</head>

<body>

<div class="container">

<h2>📅 Daily Planner</h2>

<div class="input-box">
  <input type="text" id="taskInput" placeholder="Enter task...">

  <select id="priority">
    <option value="low">Low</option>
    <option value="medium">Medium</option>
    <option value="high">High</option>
  </select>

  <button onclick="addTask()">Add</button>
</div>

<div class="progress-box">
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="summary" id="summaryText">0% Completed</div>
</div>

<div id="taskList"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>
<script src="utils.js"></script>

<script>

// ==========================
// DATA
// ==========================
let tasks = [];

// ==========================
// AUTH CHECK
// ==========================
firebase.auth().onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    loadTasks();
  }
});

// ==========================
// LOAD TASKS (SAFE)
// ==========================
function loadTasks() {

  // 🔹 1. Load from localStorage (instant UI)
  const local = localStorage.getItem("tasks");
  if (local) {
    const parsed = JSON.parse(local);
    tasks = parsed.tasks || [];
    renderTasks();
  }

  // 🔹 2. Real-time Firebase sync
  listenData("tasks", (data) => {
    if (data && data.tasks) {
tasks = Array.isArray(data.tasks)
  ? data.tasks
  : Object.values(data.tasks || {});      renderTasks();
    }
  });
}

// ==========================
// RENDER
// ==========================
function renderTasks() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  let completed = 0;

  tasks.forEach((task, index) => {

    if (task.done) completed++;

    const div = document.createElement("div");
    div.className = `task ${task.priority} ${task.done ? "done" : ""}`;

    div.innerHTML = `
      <span>${task.text}</span>
      <div class="actions">
        <button class="done-btn" onclick="toggleTask(${index})">✔</button>
        <button class="delete-btn" onclick="deleteTask(${index})">❌</button>
      </div>
    `;

    list.appendChild(div);
  });

  updateProgress(completed);
}

// ==========================
// ADD
// ==========================
function addTask() {
  const text = document.getElementById("taskInput").value.trim();
  const priority = document.getElementById("priority").value;

  if (!text) return;

  tasks.push({
    text,
    priority,
    done: false
  });

  document.getElementById("taskInput").value = "";

  saveData("tasks", { tasks });

  // ✅ ADD THIS LINE HERE
  updateWeeklyData();

  renderTasks();
}
// ==========================
// TOGGLE
// ==========================
function toggleTask(index) {
  tasks[index].done = !tasks[index].done;
  saveData("tasks", { tasks });
  updateWeeklyData();
}

// ==========================
// DELETE
// ==========================
function deleteTask(index) {
  tasks.splice(index, 1);
  saveData("tasks", { tasks });
  updateWeeklyData();
}

// ==========================
// PROGRESS
// ==========================
function updateProgress(doneCount) {
  const total = tasks.length;

  let percent = total === 0 ? 0 : Math.round((doneCount / total) * 100);

  document.getElementById("progressFill").style.width = percent + "%";
  document.getElementById("summaryText").innerText =
    `${percent}% Completed (${doneCount}/${total})`;
}

// ==========================
// AUTO SAVE
// ==========================
autoSaveInput("taskInput", "taskDraft");
enableGlobalAutoSave();

</script>
<footer style="text-align:center; margin-top:40px;">
  <a href="about.html">About</a> |
  <a href="privacy.html">Privacy</a> |
  <a href="terms.html">Terms</a> |
  <a href="contact.html">Contact</a>
</footer>
</body>
</html>
