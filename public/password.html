<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator - QuickTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>
body {
  font-family: Poppins, sans-serif;
  background: #eef2ff;
  padding: 30px;
}

.container {
  max-width: 500px;
  margin: auto;
  text-align: center;
}

h1 {
  margin-bottom: 20px;
}

.output {
  display: flex;
  gap: 10px;
}

.output input {
  flex: 1;
  padding: 10px;
  font-size: 16px;
}

button {
  padding: 10px;
  border: none;
  background: #4f46e5;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.options {
  margin-top: 20px;
  text-align: left;
}

.strength {
  margin-top: 10px;
  font-weight: bold;
}

.history {
  margin-top: 20px;
  text-align: left;
}

.history-item {
  background: white;
  padding: 8px;
  margin-top: 5px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔐 Password Generator</h1>

<div class="output">
  <input type="text" id="password" readonly>
  <button onclick="copyPassword()">📋</button>
</div>

<p>Length: <span id="lenValue">12</span></p>
<input type="range" min="6" max="30" value="12" id="length">

<div class="options">
  <label><input type="checkbox" id="upper" checked> Uppercase</label><br>
  <label><input type="checkbox" id="lower" checked> Lowercase</label><br>
  <label><input type="checkbox" id="number" checked> Numbers</label><br>
  <label><input type="checkbox" id="symbol" checked> Symbols</label><br>
  <label><input type="checkbox" id="exclude"> Exclude Similar (O,0,l,I)</label>
</div>

<div class="strength" id="strengthText">Strength: -</div>

<br>

<button onclick="generatePassword()">Generate</button>
<button onclick="generateStrong()">🔥 Strong</button>

<div class="history">
  <h3>🕘 Recent Passwords</h3>
  <div id="history"></div>
</div>

</div>

<script>

const upperChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const lowerChars = "abcdefghijklmnopqrstuvwxyz";
const numberChars = "0123456789";
const symbolChars = "!@#$%^&*()_+[]{}<>?";

const excludeChars = "O0lI";

const lengthSlider = document.getElementById("length");
const lenValue = document.getElementById("lenValue");

lengthSlider.addEventListener("input", () => {
  lenValue.innerText = lengthSlider.value;
});

function generatePassword() {

  let chars = "";

  if (document.getElementById("upper").checked) chars += upperChars;
  if (document.getElementById("lower").checked) chars += lowerChars;
  if (document.getElementById("number").checked) chars += numberChars;
  if (document.getElementById("symbol").checked) chars += symbolChars;

  if (document.getElementById("exclude").checked) {
    chars = chars.split("").filter(c => !excludeChars.includes(c)).join("");
  }

  if (!chars) {
    alert("Select at least one option!");
    return;
  }

  let password = "";
  const length = lengthSlider.value;

  for (let i = 0; i < length; i++) {
    password += chars[Math.floor(Math.random() * chars.length)];
  }

  document.getElementById("password").value = password;

  checkStrength(password);
  saveHistory(password);
}

// 🔥 STRONG PRESET
function generateStrong() {
  document.getElementById("upper").checked = true;
  document.getElementById("lower").checked = true;
  document.getElementById("number").checked = true;
  document.getElementById("symbol").checked = true;
  document.getElementById("length").value = 16;
  lenValue.innerText = 16;

  generatePassword();
}

// 🔐 STRENGTH CHECK
function checkStrength(pw) {

  let strength = "Weak";

  if (pw.length > 12 &&
      /[A-Z]/.test(pw) &&
      /[a-z]/.test(pw) &&
      /[0-9]/.test(pw) &&
      /[^A-Za-z0-9]/.test(pw)) {
    strength = "Strong";
  } else if (pw.length >= 8) {
    strength = "Medium";
  }

  document.getElementById("strengthText").innerText =
    "Strength: " + strength;
}

// 📋 COPY
function copyPassword() {
  const input = document.getElementById("password");
  input.select();
  document.execCommand("copy");
  alert("Copied!");
}

// 🕘 HISTORY
function saveHistory(pw) {

  let history = JSON.parse(localStorage.getItem("pwHistory")) || [];

  history.unshift(pw);
  history = history.slice(0,5);

  localStorage.setItem("pwHistory", JSON.stringify(history));

  loadHistory();
}

function loadHistory() {

  const container = document.getElementById("history");
  const history = JSON.parse(localStorage.getItem("pwHistory")) || [];

  container.innerHTML = "";

  history.forEach(p => {
    container.innerHTML += `<div class="history-item">${p}</div>`;
  });
}

loadHistory();

</script>
<script src="utils.js"></script>

autoSaveInput("goalInput", "goalData");

</html>
