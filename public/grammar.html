<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Writing Assistant</title>

<style>
body {
  font-family: Poppins, sans-serif;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  padding: 20px;
  color: #333;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* TEXT AREA */
textarea {
  width: 100%;
  height: 140px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  resize: none;
  margin-bottom: 15px;
}

/* BUTTON GROUP */
.buttons {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #4f46e5;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #4338ca;
}

/* OUTPUT */
.output-box {
  margin-top: 20px;
  padding: 15px;
  background: #f9fafb;
  border-radius: 10px;
}

.label {
  font-weight: bold;
  margin-top: 10px;
}

.result {
  margin-top: 5px;
  padding: 10px;
  background: #eef2ff;
  border-radius: 8px;
}

/* LOADER */
.loader {
  text-align: center;
  margin-top: 10px;
  display: none;
}

.loader span {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: #4f46e5;
  border-radius: 50%;
  margin: 3px;
  animation: bounce 0.6s infinite alternate;
}

.loader span:nth-child(2) { animation-delay: 0.2s; }
.loader span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  to { transform: translateY(-8px); }
}

/* COPY BUTTON */
.copy-btn {
  margin-top: 10px;
  background: green;
}
</style>
</head>

<body>

<div class="container">
  <h2>🤖 AI Writing Assistant</h2>

  <textarea id="inputText" placeholder="Enter your text..."></textarea>

  <div class="buttons">
    <button onclick="runAI('grammar')">Fix Grammar</button>
    <button onclick="runAI('formal')">Formal Rewrite</button>
    <button onclick="runAI('casual')">Casual Rewrite</button>
    <button onclick="runAI('professional')">Professional</button>
    <button onclick="runAI('paraphrase')">Paraphrase</button>
  </div>

  <div class="loader" id="loader">
    <span></span><span></span><span></span>
  </div>

  <div class="output-box" id="outputBox" style="display:none;">
    <div class="label">Result:</div>
    <div id="resultText" class="result"></div>
    <button class="copy-btn" onclick="copyText()">Copy</button>
  </div>
</div>

<script>
async function runAI(type) {
  const text = document.getElementById("inputText").value.trim();

  if (!text) return alert("Enter text first!");

  document.getElementById("loader").style.display = "block";
  document.getElementById("outputBox").style.display = "block";
  document.getElementById("resultText").innerText = "";

  try {
    const response = await fetch("http://localhost:5000/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text, type })
    });

    const data = await response.json();

    document.getElementById("resultText").innerText =
      data.result || "No result";

  } catch (err) {
    document.getElementById("resultText").innerText =
      "Error connecting to AI";
  }

  document.getElementById("loader").style.display = "none";
}

// COPY
function copyText() {
  const text = document.getElementById("resultText").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

  <a href="privacy.html">Privacy</a> |
  <a href="terms.html">Terms</a> |

</footer>
</body>
</html>
