<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Email Generator</title>

<link rel="stylesheet" href="style.css">

<style>
body {
  font-family: Poppins, sans-serif;
  background: #eef2ff;
  padding: 20px;
}

.container {
  max-width: 750px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 { text-align: center; }

.input-box {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

input, textarea, select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

textarea { min-height: 100px; }

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #4f46e5;
  color: white;
  cursor: pointer;
}

.ai-btn { background: #10b981; }

.output {
  margin-top: 20px;
  background: #f9fafb;
  padding: 15px;
  border-radius: 10px;
  white-space: pre-line;
}

.actions {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

.copy-btn { background: green; }
.clear-btn { background: crimson; }
</style>
</head>

<body>

<div class="container">

<h2>🤖 AI Email Generator</h2>

<div class="input-box">

<select id="type">
  <option value="job">Job Application</option>
  <option value="leave">Leave Request</option>
  <option value="internship">Internship Request</option>
  <option value="formal">Formal Email</option>
</select>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="receiver" placeholder="Receiver Name">
<input type="text" id="subject" placeholder="Subject">

<textarea id="message" placeholder="Describe what you want (AI will generate)..."></textarea>

<button class="ai-btn" onclick="generateAI()">🤖 Generate with AI</button>
<button onclick="improveEmail()">✨ Improve Email</button>

</div>

<div class="output" id="output"></div>

<div class="actions">
  <button class="copy-btn" onclick="copyEmail()">Copy</button>
  <button class="clear-btn" onclick="clearAll()">Clear</button>
</div>

</div>

<script>

// 🤖 AI GENERATOR (SMART LOGIC)
function generateAI() {

  const type = document.getElementById("type").value;
  const name = document.getElementById("name").value;
  const receiver = document.getElementById("receiver").value;
  const subject = document.getElementById("subject").value;
  const message = document.getElementById("message").value;

  let email = "";

  if (type === "job") {
    email = `Subject: ${subject}

Dear ${receiver},

I hope you are doing well.

I am writing to express my interest in the position. I believe my skills align well with your requirements.

${message || "I am passionate and eager to contribute to your organization."}

I would love the opportunity to discuss further.

Thank you for your time.

Sincerely,
${name}`;
  }

  if (type === "leave") {
    email = `Subject: ${subject}

Dear ${receiver},

I would like to request leave.

${message || "Due to personal reasons, I will not be able to attend."}

Kindly grant me leave.

Thank you.

Regards,
${name}`;
  }

  if (type === "internship") {
    email = `Subject: ${subject}

Dear ${receiver},

I am writing to express my interest in an internship opportunity.

${message || "I am eager to gain practical experience and contribute."}

I would be grateful for the opportunity.

Sincerely,
${name}`;
  }

  if (type === "formal") {
    email = `Subject: ${subject}

Dear ${receiver},

${message || "I am reaching out regarding an important matter."}

Thank you for your time.

Regards,
${name}`;
  }

  document.getElementById("output").innerText = email;
  localStorage.setItem("emailDraft", email);
}

// ✨ IMPROVE EMAIL
function improveEmail() {
  let text = document.getElementById("output").innerText;

  if (!text) return;

  text = text.replace("I am writing", "I am pleased to write");
  text = text.replace("Thank you", "Thank you very much");

  document.getElementById("output").innerText = text;
}

// 📋 COPY
function copyEmail() {
  const text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

// 🧹 CLEAR
function clearAll() {
  document.getElementById("name").value = "";
  document.getElementById("receiver").value = "";
  document.getElementById("subject").value = "";
  document.getElementById("message").value = "";
  document.getElementById("output").innerText = "";
}

// 🔄 LOAD SAVED
window.onload = () => {
  const saved = localStorage.getItem("emailDraft");
  if (saved) {
    document.getElementById("output").innerText = saved;
  }
};

</script>

</footer>
</body>
</html>
