  <!-- PERCENTAGE CALCULATOR -->
  <section class="tool-page">
    <h1>Percentage Calculator</h1>

    <div class="tool-card">

      <label>Obtained Marks:</label>
      <input type="number" id="obtained" placeholder="Enter obtained marks">

      <label>Total Marks:</label>
      <input type="number" id="total" placeholder="Enter total marks">

      <button onclick="calculatePercentage()">Calculate Percentage</button>

      <p id="percentageResult">Enter values and click Calculate.</p>

    </div>
  </section>

  <script>
    function calculatePercentage() {
      const obtained = parseFloat(document.getElementById("obtained").value);
      const total = parseFloat(document.getElementById("total").value);

      if (isNaN(obtained) || isNaN(total) || total === 0) {
        document.getElementById("percentageResult").innerText = "Please enter valid values!";
        return;
      }

      const percentage = ((obtained / total) * 100).toFixed(2);

      document.getElementById("percentageResult").innerText = 
        "Your Percentage is: " + percentage + "%";
    }
  </script>
