<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter - QuickTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>
body {
  font-family: Poppins, sans-serif;
  background: #eef2ff;
  padding: 30px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  text-align: center;
}

textarea {
  width: 100%;
  height: 200px;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 15px;
  margin-top: 20px;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  background: #4f46e5;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.keyword-box {
  margin-top: 20px;
  background: white;
  padding: 15px;
  border-radius: 10px;
}

.keyword {
  display: inline-block;
  margin: 5px;
  padding: 5px 10px;
  background: #4f46e5;
  color: white;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">

<h1>📝 Word Counter + SEO Tool</h1>

<textarea id="text" placeholder="Type or paste text..."></textarea>

<div>
  <button onclick="copyText()">📋 Copy</button>
  <button onclick="clearText()">🗑 Clear</button>
  <button onclick="toggleSEO()">🔍 SEO Mode</button>
</div>

<div class="stats">
  <div class="box"><h3 id="words">0</h3><p>Words</p></div>
  <div class="box"><h3 id="characters">0</h3><p>Characters</p></div>
  <div class="box"><h3 id="reading">0</h3><p>Reading Time</p></div>
</div>

<div class="keyword-box" id="keywordBox" style="display:none;">
  <h3>🔥 Top Keywords</h3>
  <div id="keywords"></div>
</div>

</div>

<script>

const textArea = document.getElementById("text");
let seoMode = false;

// STOP WORDS
const stopWords = ["the","is","and","to","in","of","a","for","on","with","as","by","at"];

textArea.addEventListener("input", updateStats);

function updateStats() {

  const text = textArea.value.toLowerCase().trim();

  const wordsArray = text.match(/\b\w+\b/g) || [];

  const wordCount = wordsArray.length;
  const charCount = text.length;
  const readingTime = Math.ceil(wordCount / 200);

  document.getElementById("words").innerText = wordCount;
  document.getElementById("characters").innerText = charCount;
  document.getElementById("reading").innerText = readingTime + " min";

  if (seoMode) {
    generateKeywords(wordsArray);
  }
}

// KEYWORD ANALYSIS
function generateKeywords(wordsArray) {

  const freq = {};

  wordsArray.forEach(word => {
    if (!stopWords.includes(word)) {
      freq[word] = (freq[word] || 0) + 1;
    }
  });

  const sorted = Object.entries(freq)
    .sort((a,b) => b[1] - a[1])
    .slice(0,5);

  const container = document.getElementById("keywords");
  container.innerHTML = "";

  sorted.forEach(([word,count]) => {

    const percent = ((count / wordsArray.length) * 100).toFixed(1);

    container.innerHTML += `
      <div class="keyword">
        ${word} (${percent}%)
      </div>
    `;
  });
}

// TOGGLE SEO
function toggleSEO() {
  seoMode = !seoMode;

  document.getElementById("keywordBox").style.display =
    seoMode ? "block" : "none";

  updateStats();
}

// COPY
function copyText() {
  textArea.select();
  document.execCommand("copy");
}

// CLEAR
function clearText() {
  textArea.value = "";
  updateStats();
}

</script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>
<script src="utils.js"></script>
<script>
autoSaveInput("goalInput", "goalData");
</script>
<script>
enableGlobalAutoSave();
</script>

</body>
</html>
