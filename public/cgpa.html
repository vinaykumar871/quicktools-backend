<!-- CGPA CALCULATOR -->
<section class="tool-page">
  <h1>CGPA Calculator</h1>

  <div class="tool-card">

    <label>Enter Grades (comma separated):</label>
    <input type="text" id="grades" placeholder="e.g. 8,7,9,10">

    <button onclick="calculateCGPA()">Calculate CGPA</button>

    <p id="cgpaResult">Enter your grades and click Calculate.</p>

  </div>
</section>

<script>
function calculateCGPA() {
  const input = document.getElementById("grades").value;

  if (!input) {
    document.getElementById("cgpaResult").innerText = "Please enter grades!";
    return;
  }

  const grades = input.split(",").map(g => Number(g.trim()));

  let sum = 0;

  for (let i = 0; i < grades.length; i++) {
    if (isNaN(grades[i])) {
      document.getElementById("cgpaResult").innerText = "Invalid input!";
      return;
    }
    sum += grades[i];
  }

  const cgpa = (sum / grades.length).toFixed(2);

  document.getElementById("cgpaResult").innerText = "Your CGPA is: " + cgpa;
}
</script>
