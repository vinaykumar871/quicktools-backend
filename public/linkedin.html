<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Bio Generator</title>

<link rel="stylesheet" href="style.css">

<style>
body {
  font-family: Poppins, sans-serif;
  background: #eef2ff;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

/* INPUT */
input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

/* BUTTON */
button {
  padding: 10px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 6px;
  margin-top: 10px;
  cursor: pointer;
}

/* OUTPUT */
.output {
  margin-top: 20px;
  background: #f8fafc;
  padding: 15px;
  border-radius: 10px;
  white-space: pre-line;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">

<h2>💼 LinkedIn Bio Generator (Pro)</h2>

<input id="name" placeholder="Your Name">
<input id="role" placeholder="Your Role (e.g. Software Developer)">
<input id="experience" placeholder="Years of Experience (e.g. 2 years)">
<textarea id="skills" placeholder="Core Skills (comma separated)"></textarea>
<textarea id="achievements" placeholder="Achievements (one per line, with numbers if possible)"></textarea>
<input id="goal" placeholder="Your Goal (job, networking, freelancing)">
<input id="keywords" placeholder="Keywords (5-10 comma separated)">
<select id="tone">
  <option value="professional">Professional</option>
  <option value="creative">Creative</option>
</select>

<button onclick="generateBio()">Generate Bio</button>
<button onclick="copyBio()">Copy</button>

<div id="output" class="output"></div>

</div>

<script>

// 🔥 AUTO-FILL FROM RESUME
const data = JSON.parse(localStorage.getItem("resumeData"));

if (data) {
  name.value = data.name || "";
  skills.value = data.skills || "";
}

// =====================
// GENERATE BIO
// =====================
function generateBio() {

  const name = document.getElementById("name").value;
  const role = document.getElementById("role").value;
  const exp = document.getElementById("experience").value;
  const skills = document.getElementById("skills").value;
  const achievements = document.getElementById("achievements").value.split("\n");
  const goal = document.getElementById("goal").value;
  const keywords = document.getElementById("keywords").value;
  const tone = document.getElementById("tone").value;

  let bio = "";

  // 🔥 HOOK
  let hook = `I am a ${role} with ${exp}, passionate about delivering impactful solutions using ${skills}.`;

  // 🔥 BODY
  let body = `I specialize in ${keywords} and enjoy solving real-world problems through technology. My focus is on creating scalable, efficient, and meaningful solutions that add value.`;

  // 🔥 ACHIEVEMENTS
  let achList = achievements
    .map(a => a.trim())
    .filter(a => a)
    .map(a => `• ${a}`)
    .join("\n");

  // 🔥 CTA
  let cta = `I am currently focused on ${goal}. Let’s connect and collaborate on exciting opportunities!`;

  // 🎨 TONE CHANGE
  if (tone === "creative") {
    hook = `🚀 ${hook}`;
    cta = `✨ Let’s build something amazing together! Open to ${goal}.`;
  }

  bio = `
${hook}

${body}

Key Achievements:
${achList}

${cta}
`;

  // 🔥 LIMIT TO 2600 CHAR
  if (bio.length > 2600) {
    bio = bio.substring(0, 2600);
  }

  document.getElementById("output").innerText = bio;
}

// =====================
// COPY
// =====================
function copyBio() {
  const text = document.getElementById("output").innerText;

  if (!text.trim()) {
    alert("Generate bio first!");
    return;
  }

  navigator.clipboard.writeText(text);
  alert("Copied!");
}

</script>
<script src="utils.js"></script>
<script>
autoSaveInput("goalInput", "goalData");
</script>
<script>
enableGlobalAutoSave();
</script>
<footer style="text-align:center; margin-top:40px;">

  <a href="privacy.html">Privacy</a> |
  <a href="terms.html">Terms</a> |
  <a href="contact.html">Contact</a>
</footer>
</body>
</html>
